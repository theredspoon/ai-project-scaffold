# Lychee link checker configuration
# https://lychee.cli.rs/guides/configuration

# Exclude paths from link checking
exclude = [
  # Ignore node_modules
  "node_modules",
  # Ignore Vale styles directory
  "styles",
]

# Exclude specific URL patterns
# exclude_path = []

# Accept these status codes
accept = [200, 204, 301, 302, 307, 308, 429]

# Number of retries
max_retries = 2

# Timeout per request (in seconds)
timeout = 10

# Number of concurrent requests
max_concurrency = 10

# Don't show progress bar in CI
no_progress = true

# Fail on missing inputs (e.g., anchor links)
# fail_missing = true

# Output format
# format = "compact"
